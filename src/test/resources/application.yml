eventhub:
  security:
    api-key: dev-test-key
    credential-encryption-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  blaze:
    chat-polling-enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:eventhub-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration/common
