spring:
  application:
    name: nollen-blaze
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${NOLLEN_DB_URL:jdbc:h2:file:./data/nollenblaze-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
    driver-class-name: org.h2.Driver
    username: ${NOLLEN_DB_USER:sa}
    password: ${NOLLEN_DB_PASSWORD:}
  sql:
    init:
      mode: always

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

nollen:
  security:
    api-key: ${NOLLEN_API_KEY:dev-local-key}
  blaze:
    client-id: ${BLAZE_CLIENT_ID:}
    client-secret: ${BLAZE_CLIENT_SECRET:}
    redirect-uri: ${BLAZE_REDIRECT_URI:http://localhost:8080/api/blaze/oauth/callback}
    auth-base-url: ${BLAZE_AUTH_BASE_URL:https://blaze.stream}
    api-base-url: ${BLAZE_API_BASE_URL:https://api.blaze.stream}
    socket-url: ${BLAZE_SOCKET_URL:https://blaze.stream}
    socket-path: ${BLAZE_SOCKET_PATH:/ws}
    scopes: ${BLAZE_SCOPES:users.read,offline.access}
    monitored-channel-id: ${BLAZE_MONITORED_CHANNEL_ID:}
