<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NollenBlaze - Live Event Intake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .header h1 { font-size: 20px; color: #ff6b35; }
        .header a { color: #8899aa; text-decoration: none; font-size: 13px; margin-left: 16px; }
        .header a:hover { color: #ff6b35; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 14px; text-align: center; }
        .stat-card .label { font-size: 11px; color: #8899aa; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 28px; font-weight: bold; margin-top: 4px; }
        .stat-card .value.accepted { color: #4caf50; }
        .stat-card .value.duplicate { color: #ff9800; }
        .stat-card .value.rejected { color: #f44336; }
        .stat-card .value.total { color: #2196f3; }
        .stat-card .value.pending { color: #9c27b0; }
        .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .controls select, .controls button { background: #1a1a2e; border: 1px solid #444; color: #e0e0e0; padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .controls select:hover, .controls button:hover { border-color: #ff6b35; }
        .controls button.primary { background: #ff6b35; border-color: #ff6b35; color: #fff; font-weight: 600; }
        .controls button.primary:hover { background: #e55a2b; }
        .controls button.secondary { background: #333; border-color: #555; }
        .events-table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 8px; overflow: hidden; }
        .events-table th { background: #16213e; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; color: #8899aa; letter-spacing: 0.5px; }
        .events-table td { padding: 10px 12px; border-top: 1px solid #333; font-size: 13px; vertical-align: top; }
        .events-table tr:hover td { background: #1f1f3a; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge.accepted { background: #1b5e20; color: #a5d6a7; }
        .badge.duplicate { background: #e65100; color: #ffcc80; }
        .badge.rejected { background: #b71c1c; color: #ef9a9a; }
        .badge.simulated { background: #1a237e; color: #90caf9; }
        .badge.manual { background: #4a148c; color: #ce93d8; }
        .payload-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; font-size: 11px; color: #aaa; }
        .empty-state { text-align: center; padding: 40px; color: #666; }
        .empty-state p { margin-top: 8px; font-size: 13px; }
        .create-form { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 20px; display: none; }
        .create-form.visible { display: block; }
        .create-form h3 { margin-bottom: 12px; font-size: 14px; color: #ff6b35; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .form-row label { display: flex; flex-direction: column; font-size: 11px; color: #8899aa; }
        .form-row input, .form-row select, .form-row textarea { background: #0a0a0a; border: 1px solid #444; color: #e0e0e0; padding: 6px 10px; border-radius: 4px; font-size: 13px; min-width: 140px; }
        .form-row textarea { min-height: 60px; font-family: monospace; }
        .form-actions { display: flex; gap: 10px; margin-top: 10px; }
        .timestamp { font-size: 11px; color: #666; }
        .id-cell { font-family: monospace; font-size: 11px; color: #666; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1b5e20; color: #a5d6a7; padding: 12px 20px; border-radius: 6px; font-size: 13px; display: none; z-index: 100; }
        .toast.visible { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🔥 NollenBlaze <span style="font-weight:300;font-size:14px;color:#8899aa">Live Event Intake</span></h1>
        </div>
        <div>
            <a href="/">Dashboard</a>
            <a href="/live-events">Live Events</a>
        </div>
    </div>
    <div class="container">
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card"><div class="label">Total</div><div class="value total" id="stat-total">-</div></div>
            <div class="stat-card"><div class="label">Accepted</div><div class="value accepted" id="stat-accepted">-</div></div>
            <div class="stat-card"><div class="label">Duplicates</div><div class="value duplicate" id="stat-duplicate">-</div></div>
            <div class="stat-card"><div class="label">Rejected</div><div class="value rejected" id="stat-rejected">-</div></div>
            <div class="stat-card"><div class="label">Pending</div><div class="value pending" id="stat-pending">-</div></div>
        </div>
        <div class="controls">
            <select id="filter-type">
                <option value="">All Types</option>
                <option value="FOLLOW">Follow</option>
                <option value="SUBSCRIPTION">Subscription</option>
                <option value="DONATION">Donation</option>
                <option value="RAID">Raid</option>
                <option value="VOTE">Vote</option>
                <option value="CHAT_MESSAGE">Chat Message</option>
                <option value="GIVEAWAY_ENTRY">Giveaway Entry</option>
                <option value="ALERT_TRIGGER">Alert Trigger</option>
                <option value="CUSTOM">Custom</option>
                <option value="TEST">Test</option>
            </select>
            <select id="filter-source">
                <option value="">All Sources</option>
                <option value="MANUAL">Manual</option>
                <option value="SIMULATED">Simulated</option>
                <option value="BLAZE_EVENT_PLACEHOLDER">Blaze Event</option>
                <option value="BLAZE_CHAT_PLACEHOLDER">Blaze Chat</option>
                <option value="INTERNAL_TEST">Internal Test</option>
            </select>
            <select id="filter-status">
                <option value="">All Statuses</option>
                <option value="ACCEPTED">Accepted</option>
                <option value="DUPLICATE">Duplicate</option>
                <option value="REJECTED">Rejected</option>
                <option value="NORMALIZED">Normalized</option>
                <option value="DISPATCH_PENDING">Dispatch Pending</option>
                <option value="DISPATCHED_PLACEHOLDER">Dispatched</option>
                <option value="FAILED">Failed</option>
            </select>
            <button class="secondary" onclick="loadEvents()">🔄 Refresh</button>
            <button class="primary" onclick="simulateEvent()">⚡ Simulate</button>
            <button class="secondary" onclick="toggleCreateForm()">+ Create</button>
        </div>
        <div class="create-form" id="create-form">
            <h3>Create Live Event</h3>
            <div class="form-row">
                <label>Type
                    <select id="create-type">
                        <option value="FOLLOW">FOLLOW</option>
                        <option value="SUBSCRIPTION">SUBSCRIPTION</option>
                        <option value="DONATION">DONATION</option>
                        <option value="RAID">RAID</option>
                        <option value="VOTE">VOTE</option>
                        <option value="CHAT_MESSAGE">CHAT_MESSAGE</option>
                        <option value="GIVEAWAY_ENTRY">GIVEAWAY_ENTRY</option>
                        <option value="ALERT_TRIGGER">ALERT_TRIGGER</option>
                        <option value="CUSTOM">CUSTOM</option>
                        <option value="TEST">TEST</option>
                    </select>
                </label>
                <label>Source
                    <select id="create-source">
                        <option value="MANUAL">MANUAL</option>
                        <option value="SIMULATED">SIMULATED</option>
                        <option value="BLAZE_EVENT_PLACEHOLDER">BLAZE_EVENT_PLACEHOLDER</option>
                        <option value="BLAZE_CHAT_PLACEHOLDER">BLAZE_CHAT_PLACEHOLDER</option>
                        <option value="INTERNAL_TEST">INTERNAL_TEST</option>
                    </select>
                </label>
                <label>Dedup Key (optional)
                    <input id="create-dedup" placeholder="optional dedup key" />
                </label>
            </div>
            <div class="form-row">
                <label>Payload (JSON)
                    <textarea id="create-payload" placeholder='{"username": "viewer", "message": "Hello!"}'></textarea>
                </label>
            </div>
            <div class="form-actions">
                <button class="primary" onclick="submitCreate()">Create Event</button>
                <button class="secondary" onclick="toggleCreateForm()">Cancel</button>
            </div>
        </div>
        <table class="events-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Source</th>
                    <th>Status</th>
                    <th>Payload</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="events-tbody">
                <tr><td colspan="6" class="empty-state"><p>Loading events...</p></td></tr>
            </tbody>
        </table>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const API = '/api/live-events';

        async function loadStats() {
            try {
                const res = await fetch(API + '/stats');
                const data = await res.json();
                document.getElementById('stat-total').textContent = data.totalEvents;
                document.getElementById('stat-accepted').textContent = data.acceptedCount;
                document.getElementById('stat-duplicate').textContent = data.duplicateCount;
                document.getElementById('stat-rejected').textContent = data.rejectedCount;
                document.getElementById('stat-pending').textContent = data.dispatchPendingCount;
            } catch(e) { console.error('Stats error:', e); }
        }

        async function loadEvents() {
            const type = document.getElementById('filter-type').value;
            const source = document.getElementById('filter-source').value;
            const status = document.getElementById('filter-status').value;
            let url = API + '?';
            if (type) url += 'type=' + type + '&';
            if (source) url += 'source=' + source + '&';
            if (status) url += 'status=' + status + '&';
            try {
                const res = await fetch(url);
                const events = await res.json();
                const tbody = document.getElementById('events-tbody');
                if (!events.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p>No events yet. Create one or simulate!</p></td></tr>';
                } else {
                    tbody.innerHTML = events.map(e => `
                        <tr>
                            <td class="id-cell">${e.id.substring(0, 8)}...</td>
                            <td><strong>${e.type}</strong></td>
                            <td><span class="badge ${e.source === 'MANUAL' ? 'manual' : 'simulated'}">${e.source}</span></td>
                            <td><span class="badge ${e.status.toLowerCase()}">${e.status}</span></td>
                            <td class="payload-cell">${escapeHtml(JSON.stringify(e.payload))}</td>
                            <td class="timestamp">${new Date(e.timestamp).toLocaleString()}</td>
                        </tr>
                    `).join('');
                }
                loadStats();
            } catch(e) { console.error('Load events error:', e); }
        }

        async function simulateEvent() {
            try {
                const res = await fetch(API + '/simulate', { method: 'POST' });
                if (res.ok) {
                    showToast('Event simulated!');
                    loadEvents();
                }
            } catch(e) { showToast('Error simulating', true); }
        }

        async function submitCreate() {
            const type = document.getElementById('create-type').value;
            const source = document.getElementById('create-source').value;
            const dedupKey = document.getElementById('create-dedup').value || null;
            const payloadText = document.getElementById('create-payload').value;
            let payload;
            try { payload = JSON.parse(payloadText || '{}'); } catch(e) { showToast('Invalid JSON payload', true); return; }
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, source, payload, dedupKey })
                });
                if (res.ok) {
                    const event = await res.json();
                    showToast('Event created: ' + event.id.substring(0, 8));
                    toggleCreateForm();
                    loadEvents();
                }
            } catch(e) { showToast('Error creating event', true); }
        }

        function toggleCreateForm() {
            document.getElementById('create-form').classList.toggle('visible');
        }

        function showToast(msg, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#b71c1c' : '#1b5e20';
            toast.style.color = isError ? '#ef9a9a' : '#a5d6a7';
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.getElementById('filter-type').addEventListener('change', loadEvents);
        document.getElementById('filter-source').addEventListener('change', loadEvents);
        document.getElementById('filter-status').addEventListener('change', loadEvents);

        loadEvents();
    </script>
</body>
</html>
