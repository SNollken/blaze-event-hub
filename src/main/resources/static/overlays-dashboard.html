<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NollenBlaze - Overlays Dashboard</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.navbar { background: #1e293b; padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #334155; }
.navbar h1 { font-size: 20px; font-weight: 700; color: #00d4ff; }
.navbar a { color: #94a3b8; text-decoration: none; font-size: 14px; }
.navbar a:hover { color: #e2e8f0; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.header h2 { font-size: 24px; font-weight: 600; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-secondary { background: #475569; color: #e2e8f0; }
.btn-secondary:hover { background: #64748b; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-copy { background: #8b5cf6; color: #fff; }
.btn-copy:hover { background: #7c3aed; }
.card { background: #1e293b; border-radius: 10px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title { font-size: 16px; font-weight: 600; }
.card-actions { display: flex; gap: 8px; }
.card-body { font-size: 14px; color: #94a3b8; }
.type-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
.type-ALERT { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
.type-GIVEAWAY { background: rgba(251, 191, 36, 0.2); color: #fde68a; }
.type-EVENTS { background: rgba(34, 197, 94, 0.2); color: #86efac; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.active { background: #22c55e; }
.status-dot.inactive { background: #6b7280; }
.url-box { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; font-family: monospace; font-size: 13px; color: #00d4ff; word-break: break-all; margin-top: 8px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #94a3b8; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #334155;
  border-radius: 6px; color: #e2e8f0; font-size: 14px; font-family: inherit;
}
.form-group textarea { min-height: 80px; font-family: monospace; font-size: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; place-items: center; }
.modal-overlay.active { display: grid; }
.modal { background: #1e293b; border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; border: 1px solid #334155; }
.modal h3 { margin-bottom: 16px; font-size: 18px; }
.empty-state { text-align: center; padding: 48px; color: #64748b; }
</style>
</head>
<body>
<div class="navbar">
  <h1>NollenBlaze</h1>
  <a href="/dashboard">Dashboard</a>
  <a href="/overlays-dashboard">Overlays</a>
</div>
<div class="container">
  <div class="header">
    <h2>Overlay Runtime</h2>
    <button class="btn btn-primary" onclick="showCreateModal()">+ New Overlay</button>
  </div>
  <div id="overlay-list">
    <div class="empty-state">Loading...</div>
  </div>
</div>

<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h3 id="modal-title">New Overlay</h3>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="form-name" placeholder="Overlay name">
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="form-type">
        <option value="ALERT">Alert</option>
        <option value="GIVEAWAY">Giveaway</option>
        <option value="EVENTS">Events</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Refresh (ms)</label>
        <input type="number" id="form-refresh" value="3000" min="500">
      </div>
      <div class="form-group">
        <label>Opacity</label>
        <input type="number" id="form-opacity" value="1.0" min="0" max="1" step="0.1">
      </div>
    </div>
    <div class="form-group">
      <label>Custom CSS</label>
      <textarea id="form-css" placeholder="/* custom styles */"></textarea>
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-submit" onclick="submitForm()">Create</button>
    </div>
  </div>
</div>

<script>
var overlays = [];
var editingId = null;

function loadOverlays() {
  fetch('/api/overlay-runtimes')
    .then(function(r) { return r.json(); })
    .then(function(data) { overlays = data; renderOverlays(); })
    .catch(function() { document.getElementById('overlay-list').innerHTML = '<div class="empty-state">Error loading overlays</div>'; });
}

function renderOverlays() {
  var el = document.getElementById('overlay-list');
  if (!overlays.length) {
    el.innerHTML = '<div class="empty-state">No overlays configured. Create one to get started!</div>';
    return;
  }
  el.innerHTML = overlays.map(function(ov) {
    var url = '/overlay/' + ov.type.toLowerCase() + 's';
    return '<div class="card">' +
      '<div class="card-header">' +
        '<div><span class="status-dot ' + (ov.enabled ? 'active' : 'inactive') + '"></span>' +
        '<span class="card-title">' + escapeHtml(ov.name) + '</span> ' +
        '<span class="type-badge type-' + ov.type + '">' + ov.type + '</span></div>' +
        '<div class="card-actions">' +
          '<button class="btn btn-copy btn-sm" onclick="copyUrl(\'' + url + '\')">Copy URL</button>' +
          '<button class="btn btn-secondary btn-sm" onclick="toggleEnabled(\'' + ov.id + '\', ' + !ov.enabled + ')">' + (ov.enabled ? 'Stop' : 'Start') + '</button>' +
          '<button class="btn btn-danger btn-sm" onclick="deleteOverlay(\'' + ov.id + '\')">Delete</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div>Refresh: ' + ov.refreshIntervalMs + 'ms | Opacity: ' + ov.opacity + '</div>' +
        '<div class="url-box">' + window.location.origin + url + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function copyUrl(url) {
  navigator.clipboard.writeText(window.location.origin + url).then(function() {
    alert('URL copied!');
  });
}

function toggleEnabled(id, enabled) {
  fetch('/api/overlay-runtimes/' + id, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({enabled: enabled})
  }).then(function() { loadOverlays(); });
}

function deleteOverlay(id) {
  if (!confirm('Delete this overlay?')) return;
  fetch('/api/overlay-runtimes/' + id, {method: 'DELETE'}).then(function() { loadOverlays(); });
}

function showCreateModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Overlay';
  document.getElementById('modal-submit').textContent = 'Create';
  document.getElementById('form-name').value = '';
  document.getElementById('form-type').value = 'ALERT';
  document.getElementById('form-refresh').value = '3000';
  document.getElementById('form-opacity').value = '1.0';
  document.getElementById('form-css').value = '';
  document.getElementById('create-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('create-modal').classList.remove('active');
}

function submitForm() {
  var body = {
    type: document.getElementById('form-type').value,
    name: document.getElementById('form-name').value || 'New Overlay',
    enabled: true,
    refreshIntervalMs: parseInt(document.getElementById('form-refresh').value, 10) || 3000,
    opacity: parseFloat(document.getElementById('form-opacity').value) || 1.0,
    customCss: document.getElementById('form-css').value || ''
  };
  var url = editingId ? '/api/overlay-runtimes/' + editingId : '/api/overlays';
  var method = editingId ? 'PUT' : 'POST';
  fetch(url, {
    method: method,
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  }).then(function() { closeModal(); loadOverlays(); });
}

loadOverlays();
</script>
</body>
</html>
