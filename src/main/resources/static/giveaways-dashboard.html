<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NollenBlaze - Giveaways Dashboard</title>
    <link rel="stylesheet" href="/dashboard.css">
    <style>
        .giveaway-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .giveaway-card { border: 1px solid #333; border-radius: 8px; padding: 1rem; background: #1a1a2e; }
        .giveaway-card h3 { margin: 0 0 0.5rem; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .status-DRAFT { background: #555; color: #fff; }
        .status-OPEN { background: #2d6a4f; color: #fff; }
        .status-CLOSED { background: #d62828; color: #fff; }
        .status-DRAWING { background: #f77f00; color: #000; }
        .status-COMPLETED { background: #0077b6; color: #fff; }
        .status-CANCELLED { background: #777; color: #fff; }
        .actions-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
        .actions-row button { font-size: 0.8rem; padding: 4px 10px; }
        .entry-list { max-height: 150px; overflow-y: auto; font-size: 0.85rem; margin-top: 0.5rem; }
        .entry-list li { list-style: none; padding: 2px 0; border-bottom: 1px solid #333; }
        .winner { color: #ffd60a; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; margin: 1rem 0; }
        .stat-card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 0.75rem; text-align: center; }
        .stat-card .label { font-size: 0.75rem; color: #aaa; }
        .stat-card strong { font-size: 1.5rem; display: block; margin-top: 0.25rem; }
        .create-form { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .create-form input, .create-form textarea { width: 100%; padding: 0.5rem; margin: 0.25rem 0; border: 1px solid #444; border-radius: 4px; background: #0d0d1a; color: #fff; box-sizing: border-box; }
        .create-form textarea { resize: vertical; min-height: 60px; }
        .create-form label { font-size: 0.85rem; color: #ccc; }
        .enter-form { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .enter-form input { flex: 1; padding: 4px 8px; border: 1px solid #444; border-radius: 4px; background: #0d0d1a; color: #fff; font-size: 0.85rem; }
        .results-section { background: #0d0d1a; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .empty-state { text-align: center; color: #777; padding: 2rem; }
    </style>
</head>
<body>
    <header class="topbar">
        <div>
            <p class="eyebrow">NollenBlaze</p>
            <h1>Giveaways Dashboard</h1>
            <p class="notice">MVP - Gerencie sorteios, inscricoes e resultados.</p>
        </div>
        <div>
            <button id="refreshAll" type="button">Atualizar</button>
            <a class="button-link" href="/" style="margin-left:0.5rem;">Voltar ao Painel</a>
        </div>
    </header>

    <main>
        <!-- Stats -->
        <section class="panel" aria-label="Estatisticas">
            <h2>Estatisticas</h2>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><span class="label">Total</span><strong id="statTotal">0</strong></div>
                <div class="stat-card"><span class="label">Rascunho</span><strong id="statDraft">0</strong></div>
                <div class="stat-card"><span class="label">Aberto</span><strong id="statOpen">0</strong></div>
                <div class="stat-card"><span class="label">Fechado</span><strong id="statClosed">0</strong></div>
                <div class="stat-card"><span class="label">Concluido</span><strong id="statCompleted">0</strong></div>
                <div class="stat-card"><span class="label">Inscricoes</span><strong id="statEntries">0</strong></div>
            </div>
        </section>

        <!-- Create giveaway -->
        <section class="panel" aria-label="Criar giveaway">
            <h2>Criar Giveaway</h2>
            <div class="create-form">
                <label>Titulo: <input id="newTitle" type="text" maxlength="200" placeholder="Ex: Sorteio Semanal"></label>
                <label>Descricao: <textarea id="newDesc" maxlength="1000" placeholder="Descricao opcional..."></textarea></label>
                <label>Max Inscricoes: <input id="newMaxEntries" type="number" min="1" value="1000" placeholder="1000"></label>
                <button id="createGiveaway" type="button">Criar Giveaway</button>
            </div>
        </section>

        <!-- Giveaways list -->
        <section class="panel" aria-label="Giveaways">
            <h2>Giveaways</h2>
            <div id="giveawaysList" class="giveaway-grid"></div>
            <div id="emptyState" class="empty-state" style="display:none;">Nenhum giveaway criado ainda.</div>
        </section>

        <!-- Selected giveaway details -->
        <section id="giveawayDetail" class="panel" style="display:none;" aria-label="Detalhes do giveaway">
            <h2 id="detailTitle">Detalhes</h2>
            <div id="detailContent"></div>
        </section>
    </main>

    <script>
        const API = '/api/giveaways';
        const $ = id => document.getElementById(id);

        async function refreshAll() {
            await Promise.all([loadStats(), loadGiveaways()]);
        }

        async function loadStats() {
            try {
                const res = await fetch(API + '/stats');
                const stats = await res.json();
                $('statTotal').textContent = stats.totalGiveaways;
                $('statDraft').textContent = stats.draftCount;
                $('statOpen').textContent = stats.openCount;
                $('statClosed').textContent = stats.closedCount;
                $('statCompleted').textContent = stats.completedCount;
                $('statEntries').textContent = stats.totalEntries;
            } catch(e) { console.error('Failed to load stats', e); }
        }

        async function loadGiveaways() {
            try {
                const res = await fetch(API);
                const giveaways = await res.json();
                const container = $('giveawaysList');
                const empty = $('emptyState');
                if (giveaways.length === 0) {
                    container.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                container.innerHTML = giveaways.map(g => `
                    <div class="giveaway-card">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <h3>${esc(g.title)}</h3>
                            <span class="status-badge status-${g.status}">${g.status}</span>
                        </div>
                        <p style="font-size:0.85rem;color:#aaa;margin:0.25rem 0;">${esc(g.description || 'Sem descricao')}</p>
                        <p style="font-size:0.8rem;margin:0;">Inscricoes: ${g.entryCount} / ${g.maxEntries}</p>
                        <div class="actions-row">
                            ${g.status === 'DRAFT' ? `<button onclick="openGiveaway('${g.id}')">Abrir</button>` : ''}
                            ${g.status === 'OPEN' ? `<button onclick="closeGiveaway('${g.id}')">Fechar</button>` : ''}
                            ${g.status === 'CLOSED' ? `<button onclick="drawWinners('${g.id}')">Sortear</button>` : ''}
                            ${g.status === 'DRAFT' ? `<button onclick="deleteGiveaway('${g.id}')">Excluir</button>` : ''}
                            <button onclick="showDetail('${g.id}')">Detalhes</button>
                        </div>
                        ${g.status === 'OPEN' ? `
                        <div class="enter-form">
                            <input id="enter-${g.id}" type="text" placeholder="Nome do participante">
                            <button onclick="enterGiveaway('${g.id}')">Inscrever</button>
                        </div>` : ''}
                    </div>
                `).join('');
            } catch(e) { console.error('Failed to load giveaways', e); }
        }

        async function createGiveaway() {
            const title = $('newTitle').value.trim();
            const description = $('newDesc').value.trim();
            const maxEntries = parseInt($('newMaxEntries').value) || 1000;
            if (!title) { alert('Titulo e obrigatorio'); return; }
            try {
                await fetch(API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title, description, maxEntries})
                });
                $('newTitle').value = '';
                $('newDesc').value = '';
                $('newMaxEntries').value = '1000';
                refreshAll();
            } catch(e) { alert('Erro ao criar giveaway'); }
        }

        async function openGiveaway(id) {
            try { await fetch(`${API}/${id}/open`, {method:'POST'}); refreshAll(); } catch(e) { alert('Erro ao abrir'); }
        }

        async function closeGiveaway(id) {
            try { await fetch(`${API}/${id}/close`, {method:'POST'}); refreshAll(); } catch(e) { alert('Erro ao fechar'); }
        }

        async function deleteGiveaway(id) {
            if (!confirm('Excluir este giveaway?')) return;
            try { await fetch(`${API}/${id}`, {method:'DELETE'}); refreshAll(); } catch(e) { alert('Erro ao excluir'); }
        }

        async function drawWinners(id) {
            if (!confirm('Sortear vencedores?')) return;
            try { await fetch(`${API}/${id}/draw`, {method:'POST'}); refreshAll(); showDetail(id); } catch(e) { alert('Erro ao sortear'); }
        }

        async function enterGiveaway(id) {
            const input = document.getElementById('enter-' + id);
            const name = input ? input.value.trim() : '';
            if (!name) { alert('Nome e obrigatorio'); return; }
            try {
                const res = await fetch(`${API}/${id}/enter`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({participantName: name})
                });
                if (!res.ok) { const err = await res.json(); alert(err.message || 'Erro ao inscrever'); return; }
                input.value = '';
                refreshAll();
            } catch(e) { alert('Erro ao inscrever'); }
        }

        async function showDetail(id) {
            const detail = $('giveawayDetail');
            detail.style.display = 'block';
            try {
                const [gwRes, entriesRes, resultsRes] = await Promise.all([
                    fetch(`${API}/${id}`),
                    fetch(`${API}/${id}/results`),
                    fetch(`${API}/${id}/results`)
                ]);
                const gw = await gwRes.json();
                const results = await resultsRes.json();
                $('detailTitle').textContent = gw.title + ' - Detalhes';

                let html = `<p><strong>Status:</strong> <span class="status-badge status-${gw.status}">${gw.status}</span></p>`;
                html += `<p><strong>Inscricoes:</strong> ${gw.entryCount} / ${gw.maxEntries}</p>`;

                if (results.winners && results.winners.length > 0) {
                    html += `<h3>Vencedores</h3><ul class="entry-list">`;
                    results.winners.forEach(w => {
                        html += `<li class="winner">* ${esc(w.participantName)} (inscrito em ${new Date(w.enteredAt).toLocaleString()})</li>`;
                    });
                    html += `</ul>`;
                }

                if (results.totalEntries > 0) {
                    const allEntriesRes = await fetch(`${API}/${id}`);
                    const allEntries = await fetch(`${API}/${id}/results`);
                    const r = await allEntries.json();
                    html += `<h3>Todas as inscricoes (${r.totalEntries})</h3>`;
                }
                $('detailContent').innerHTML = html;
            } catch(e) { console.error('Failed to load detail', e); }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        $('createGiveaway').addEventListener('click', createGiveaway);
        $('refreshAll').addEventListener('click', refreshAll);

        refreshAll();
    </script>
</body>
</html>
